name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build -o lhd ./cmd/lhd
      - name: Vet
        run: go vet ./...
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lhd
          path: lhd

  security:
    name: Security
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build for CodeQL
        run: go build -o lhd ./cmd/lhd
      - name: Run CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3
